<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 780" font-family="'JetBrains Mono', 'Noto Sans CJK SC', monospace" font-size="12">
  <defs>
    <style>
      .signal-label { font-size: 12px; font-weight: 600; fill: #1a1a2e; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a2e; }
      .subtitle { font-size: 11px; fill: #6c757d; }
      .case-title { font-size: 13px; font-weight: 700; fill: #c92a2a; }
      .case-desc { font-size: 10px; fill: #6c757d; }
      .wave-good { stroke: #2b8a3e; stroke-width: 2; fill: none; }
      .wave-bad { stroke: #c92a2a; stroke-width: 2; fill: none; }
      .wave-bad2 { stroke: #e8590c; stroke-width: 2; fill: none; }
      .annotation { font-size: 10px; fill: #c92a2a; font-weight: 600; }
      .dim-anno { font-size: 9px; fill: #e8590c; }
    </style>
    <marker id="arrBad" markerWidth="6" markerHeight="4" refX="6" refY="2" orient="auto">
      <path d="M0,0 L6,2 L0,4" fill="none" stroke="#c92a2a" stroke-width="0.8"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="530" y="25" text-anchor="middle" class="title">DPI 异常波形诊断图集</text>
  <text x="530" y="42" text-anchor="middle" class="subtitle">常见问题波形对比与原因分析</text>

  <!-- ==================== Case 1: 信号反射/振铃 ==================== -->
  <rect x="20" y="55" width="1020" height="150" fill="#fff5f5" stroke="#ffc9c9" stroke-width="1" rx="6"/>
  <text x="40" y="78" class="case-title">Case 1: 信号反射 / 振铃 (Ringing)</text>
  <text x="40" y="93" class="case-desc">原因: 阻抗不匹配、走线过长、缺少终端电阻 | 现象: 屏幕闪烁、花点、色彩异常</text>

  <!-- Good waveform -->
  <text x="40" y="118" class="signal-label" font-size="10" fill="#2b8a3e">正常:</text>
  <polyline class="wave-good" points="60,140 60,115 120,115 120,140 180,140 180,115 240,115 240,140 300,140 300,115 360,115 360,140 420,140"/>

  <!-- Bad waveform with ringing -->
  <text x="40" y="158" class="signal-label" font-size="10" fill="#c92a2a">异常:</text>
  <polyline class="wave-bad" points="
    460,175 460,150 465,148 468,155 472,147 476,153 480,150 520,150
    525,148 528,155 532,147 536,153 540,150 540,175 545,177 548,170 552,178 556,172 560,175
    620,175 620,150 625,148 628,155 632,147 636,153 640,150 680,150
    685,148 688,155 692,147 696,153 700,150 700,175 705,177 708,170 712,178 716,172 720,175
    780,175 780,150 785,148 788,155 792,147 796,153 800,150 840,150
  "/>
  <!-- Annotation -->
  <line x1="465" y1="145" x2="465" y2="130" stroke="#c92a2a" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="468" y="127" class="annotation">过冲</text>
  <line x1="472" y1="155" x2="472" y2="168" stroke="#c92a2a" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="475" y="172" class="annotation">振铃</text>

  <!-- ==================== Case 2: 时序偏移 ==================== -->
  <rect x="20" y="215" width="1020" height="155" fill="#fff9db" stroke="#ffe066" stroke-width="1" rx="6"/>
  <text x="40" y="238" class="case-title" fill="#e67700">Case 2: 时序偏移 / 建立保持时间不足</text>
  <text x="40" y="253" class="case-desc">原因: PCLK与数据信号相位偏移过大 | 现象: 数据采样错误、花屏、颜色偏移</text>

  <!-- PCLK reference -->
  <text x="40" y="278" class="signal-label" font-size="10" fill="#e8590c">PCLK:</text>
  <polyline class="wave-bad2" points="100,295 100,275 140,275 140,295 180,295 180,275 220,275 220,295 260,295 260,275 300,275 300,295 340,295 340,275 380,275 380,295 420,295 420,275 460,275 460,295 500,295"/>

  <!-- Data with skew -->
  <text x="40" y="318" class="signal-label" font-size="10" fill="#c92a2a">DATA:</text>
  <polyline class="wave-bad" points="
    100,340 115,340 115,320 155,320 155,340 195,340 195,320 235,320 235,340 275,340 275,320 315,320 315,340 355,340 355,320 395,320 395,340 435,340 435,320 475,320 475,340 500,340
  "/>

  <!-- Normal data for comparison -->
  <text x="540" y="278" class="signal-label" font-size="10" fill="#2b8a3e">正常PCLK:</text>
  <polyline class="wave-good" points="620,295 620,275 660,275 660,295 700,295 700,275 740,275 740,295 780,295 780,275 820,275 820,295 860,295 860,275 900,275 900,295 940,295 940,275 980,275 980,295 1020,295"/>

  <text x="540" y="318" class="signal-label" font-size="10" fill="#2b8a3e">正常DATA:</text>
  <polyline class="wave-good" points="
    620,340 640,340 640,320 680,320 680,340 720,340 720,320 760,320 760,340 800,340 800,320 840,320 840,340 880,340 880,320 920,320 920,340 960,340 960,320 1000,320 1000,340 1020,340
  "/>

  <!-- Skew annotation -->
  <line x1="115" y1="275" x2="115" y2="360" stroke="#c92a2a" stroke-width="0.8" stroke-dasharray="3,2"/>
  <line x1="140" y1="275" x2="140" y2="360" stroke="#2b8a3e" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="120" y="360" class="dim-anno">偏移量</text>

  <!-- ==================== Case 3: 信号丢失 ==================== -->
  <rect x="20" y="380" width="1020" height="130" fill="#fff5f5" stroke="#ffc9c9" stroke-width="1" rx="6"/>
  <text x="40" y="403" class="case-title">Case 3: 信号丢失 / 间歇性中断</text>
  <text x="40" y="418" class="case-desc">原因: 虚焊、接触不良、EMI干扰 | 现象: 屏幕间歇性黑屏、局部花屏、行/列偏移</text>

  <!-- HSYNC with gap -->
  <text x="40" y="448" class="signal-label" font-size="10">HSYNC:</text>
  <polyline class="wave-good" points="120,460 120,460 120,475 140,475 140,460 200,460 200,475 220,475 220,460 280,460 280,475 300,475 300,460"/>
  <!-- Gap/break -->
  <text x="370" y="470" class="annotation" font-size="11">??? 信号丢失 ???</text>
  <line x1="310" y1="460" x2="340" y2="460" stroke="#c92a2a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <line x1="600" y1="460" x2="630" y2="460" stroke="#c92a2a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <!-- Resume -->
  <polyline class="wave-good" points="640,460 640,475 660,475 660,460 720,460 720,475 740,475 740,460 800,460 800,475 820,475 820,460 880,460"/>

  <!-- DE with dropout -->
  <text x="40" y="490" class="signal-label" font-size="10">DE:</text>
  <polyline class="wave-good" points="120,495 400,495 400,480 700,480"/>
  <line x1="700" y1="480" x2="730" y2="480" stroke="#c92a2a" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="700" y="477" class="annotation" font-size="9">DE 中断</text>
  <polyline class="wave-good" points="740,480 1000,480"/>

  <!-- ==================== Case 4: 极性错误 ==================== -->
  <rect x="20" y="520" width="1020" height="120" fill="#f3f0ff" stroke="#d0bfff" stroke-width="1" rx="6"/>
  <text x="40" y="543" class="case-title" fill="#7048e8">Case 4: 同步信号极性配置错误</text>
  <text x="40" y="558" class="case-desc">原因: 软件配置的极性与时序要求不匹配 | 现象: 画面撕裂、滚动、偏移、完全白屏/黑屏</text>

  <!-- Wrong polarity HSYNC -->
  <text x="40" y="583" class="signal-label" font-size="10" fill="#c92a2a">错误极性:</text>
  <polyline class="wave-bad" points="140,590 140,590 200,590 200,575 220,575 220,590 280,590 280,575 300,575 300,590 360,590 360,575 380,575 380,590 440,590"/>
  <text x="210" y="572" font-size="9" fill="#c92a2a">Active High (错误)</text>

  <!-- Correct polarity HSYNC -->
  <text x="40" y="623" class="signal-label" font-size="10" fill="#2b8a3e">正确极性:</text>
  <polyline class="wave-good" points="140,610 200,610 200,625 220,625 220,610 280,610 280,625 300,625 300,610 360,610 360,625 380,625 380,610 440,610"/>
  <text x="210" y="637" font-size="9" fill="#2b8a3e">Active Low (正确)</text>

  <!-- ==================== Case 5: 时钟异常 ==================== -->
  <rect x="20" y="650" width="1020" height="120" fill="#fff5f5" stroke="#ffc9c9" stroke-width="1" rx="6"/>
  <text x="40" y="673" class="case-title">Case 5: PCLK 异常 / 时钟不稳定</text>
  <text x="40" y="688" class="case-desc">原因: PLL 锁定不良、时钟源抖动、电源噪声 | 现象: 整体画面抖动、行频不稳、画面拉伸/压缩</text>

  <!-- Normal PCLK -->
  <text x="40" y="713" class="signal-label" font-size="10" fill="#2b8a3e">正常:</text>
  <polyline class="wave-good" points="100,730 100,710 130,710 130,730 160,730 160,710 190,710 190,730 220,730 220,710 250,710 250,730 280,730 280,710 310,710 310,730 340,730 340,710 370,710 370,730 400,730 400,710 430,710 430,730 460,730"/>

  <!-- Jittery PCLK -->
  <text x="500" y="713" class="signal-label" font-size="10" fill="#c92a2a">抖动:</text>
  <polyline class="wave-bad" points="
    560,730 560,710 585,710 585,730 620,730 620,710 640,710 640,730
    655,730 655,710 695,710 695,730 720,730 720,710 735,710 735,730
    760,730 760,710 775,710 775,730 810,730 810,710 828,710 828,730
    845,730 845,710 888,710 888,730 910,730 910,710 925,710 925,730
    950,730 950,710 978,710 978,730 1000,730 1000,710 1020,710
  "/>
  <text x="750" y="755" text-anchor="middle" class="annotation" font-size="10">周期不均匀 = 时钟抖动 (Jitter)</text>
</svg>