  <text x="55" y="793" text-anchor="middle" class="value">100nF</text>
  <text x="55" y="808" text-anchor="middle" class="note">VDD_IO → GND</text>

  <rect x="90" y="780" width="50" height="18" fill="#fff3bf" stroke="#e8590c" stroke-width="1" rx="2"/>
