<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1060 520" font-family="'JetBrains Mono', 'Noto Sans CJK SC', monospace" font-size="12">
  <defs>
    <style>
      .signal-label { font-size: 13px; font-weight: 600; fill: #1a1a2e; }
      .dim-label { font-size: 11px; fill: #0066cc; font-weight: 600; }
      .dim-line { stroke: #0066cc; stroke-width: 1; stroke-dasharray: 4,3; }
      .dim-arrow { stroke: #0066cc; stroke-width: 1.2; fill: none; marker-start: url(#arrowL); marker-end: url(#arrowR); }
      .wave-pclk { stroke: #e8590c; stroke-width: 2.2; fill: none; }
      .wave-hsync { stroke: #2b8a3e; stroke-width: 2.2; fill: none; }
      .wave-de { stroke: #1864ab; stroke-width: 2.2; fill: none; }
      .wave-data { stroke: #7048e8; stroke-width: 2; fill: none; }
      .bg-hsync { fill: #2b8a3e10; }
      .bg-de { fill: #1864ab08; }
      .bg-hbp { fill: #e8590c08; }
      .bg-hfp { fill: #868e9608; }
      .title { font-size: 16px; font-weight: 700; fill: #1a1a2e; }
      .subtitle { font-size: 11px; fill: #6c757d; }
    </style>
    <marker id="arrowR" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#0066cc" stroke-width="1"/>
    </marker>
    <marker id="arrowL" markerWidth="8" markerHeight="6" refX="0" refY="3" orient="auto">
      <path d="M8,0 L0,3 L8,6" fill="none" stroke="#0066cc" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="530" y="25" text-anchor="middle" class="title">DPI 水平时序波形图 (Horizontal Timing)</text>
  <text x="530" y="42" text-anchor="middle" class="subtitle">以 800×480 分辨率为例 | HSYNC=1, HBP=40, Active=800, HFP=40 (单位: PCLK)</text>

  <!-- Background regions -->
  <rect x="130" y="55" width="24" height="440" class="bg-hsync" rx="2"/>
  <rect x="154" y="55" width="96" height="440" class="bg-hbp" rx="2"/>
  <rect x="250" y="55" width="672" height="440" class="bg-de" rx="2"/>
  <rect x="922" y="55" width="96" height="440" class="bg-hfp" rx="2"/>

  <!-- Region labels at top -->
  <text x="142" y="70" text-anchor="middle" class="dim-label" font-size="10">HSYNC</text>
  <text x="202" y="70" text-anchor="middle" class="dim-label" font-size="10">HBP</text>
  <text x="586" y="70" text-anchor="middle" class="dim-label" font-size="10">Active Display (800 pixels)</text>
  <text x="970" y="70" text-anchor="middle" class="dim-label" font-size="10">HFP</text>

  <!-- ========== Row 1: PCLK ========== -->
  <text x="15" y="108" class="signal-label">PCLK</text>
  <!-- Each PCLK cycle = 24px wide. Active region = 800 pixels = 672px wide. So 1 pixel ≈ 0.84px -->
  <!-- We show ~28 PCLK cycles across the full width for clarity -->
  <!-- PCLK is a clean square wave -->
  <polyline class="wave-pclk" points="
    130,120 130,100 154,100 154,120 178,120 178,100 202,100 202,120
    226,120 226,100 250,100 250,120 274,120 274,100 298,100 298,120
    322,120 322,100 346,100 346,120 370,120 370,100 394,100 394,120
    418,120 418,100 442,100 442,120 466,120 466,100 490,100 490,120
    514,120 514,100 538,100 538,120 562,120 562,100 586,100 586,120
    610,120 610,100 634,100 634,120 658,120 658,100 682,100 682,120
    706,120 706,100 730,100 730,120 754,120 754,100 778,100 778,120
    802,120 802,100 826,100 826,120 850,120 850,100 874,100 874,120
    898,120 898,100 922,100 922,120 946,120 946,100 970,100 970,120
    994,120 994,100 1018,100 1018,120
  "/>

  <!-- ========== Row 2: HSYNC ========== -->
  <text x="15" y="178" class="signal-label">HSYNC</text>
  <!-- HSYNC: active low pulse during HSYNC region, then high -->
  <polyline class="wave-hsync" points="
    130,160 130,190 154,190 154,160 1018,160
  "/>
  <text x="142" y="184" text-anchor="middle" font-size="9" fill="#2b8a3e" font-weight="600">Active Low</text>

  <!-- ========== Row 3: DE ========== -->
  <text x="15" y="268" class="signal-label">DE</text>
  <!-- DE: low during HSYNC+HBP+HFP, high during active -->
  <polyline class="wave-de" points="
    130,250 250,250 250,220 922,220 922,250 1018,250
  "/>
  <text x="586" y="240" text-anchor="middle" font-size="10" fill="#1864ab" font-weight="600">DE High = Valid Pixel Data</text>

  <!-- ========== Row 4: R[7:0] (Red Data) - CLEAN SQUARE WAVE ========== -->
  <text x="15" y="328" class="signal-label" fill="#7048e8">R[7:0]</text>
  <!-- Data is LOW outside active region, then clean square wave inside active region -->
  <!-- Outside active: flat LOW at y=340 -->
  <!-- Inside active: alternating HIGH/LOW square wave -->
  <!-- Each "pixel" in our display ≈ 0.84px wide, but we show ~14 pixel-cycles for clarity -->
  <!-- Active region: x=250 to x=922, that's 672px. We show ~28 square-wave cycles -->
  <polyline class="wave-data" points="
    130,340 250,340
    250,340 250,320 274,320 274,340 298,340 298,320 322,320 322,340
    346,340 346,320 370,320 370,340 394,340 394,320 418,320 418,340
    442,340 442,320 466,320 466,340 490,340 490,320 514,320 514,340
    538,340 538,320 562,320 562,340 586,340 586,320 610,320 610,340
    634,340 634,320 658,320 658,340 682,340 682,320 706,320 706,340
    730,340 730,320 754,320 754,340 778,340 778,320 802,320 802,340
    826,340 826,320 850,320 850,340 874,340 874,320 898,320 898,340
    922,340 922,340 1018,340
  "/>

  <!-- ========== Row 5: G[7:0] (Green Data) - CLEAN SQUARE WAVE ========== -->
  <text x="15" y="388" class="signal-label" fill="#7048e8">G[7:0]</text>
  <!-- Different pattern from R to show data variation -->
  <polyline class="wave-data" points="
    130,400 250,400
    250,400 250,380 286,380 286,400 310,400 310,380 346,380 346,400
    370,400 370,380 406,380 406,400 430,400 430,380 466,380 466,400
    490,400 490,380 526,380 526,400 550,400 550,380 586,380 586,400
    610,400 610,380 646,380 646,400 670,400 670,380 706,380 706,400
    730,400 730,380 766,380 766,400 790,400 790,380 826,380 826,400
    850,400 850,380 886,380 886,400 910,400 910,380 922,380 922,400
    1018,400
  "/>

  <!-- ========== Row 6: B[7:0] (Blue Data) - CLEAN SQUARE WAVE ========== -->
  <text x="15" y="448" class="signal-label" fill="#7048e8">B[7:0]</text>
  <!-- Another different pattern -->
  <polyline class="wave-data" points="
    130,460 250,460
    250,460 250,440 262,440 262,460 298,460 298,440 310,440 310,460
    346,460 346,440 358,440 358,460 394,460 394,440 406,440 406,460
    442,460 442,440 454,440 454,460 490,460 490,440 502,440 502,460
    538,460 538,440 550,440 550,460 586,460 586,440 598,440 598,460
    634,460 634,440 646,440 646,460 682,460 682,440 694,440 694,460
    730,460 730,440 742,440 742,460 778,460 778,440 790,440 790,460
    826,460 826,440 838,440 838,460 874,460 874,440 886,440 886,460
    922,460 922,460 1018,460
  "/>

  <!-- ========== Dimension Lines ========== -->
  <!-- HSYNC width -->
  <line x1="130" y1="475" x2="130" y2="490" class="dim-line"/>
  <line x1="154" y1="475" x2="154" y2="490" class="dim-line"/>
  <line x1="130" y1="485" x2="154" y2="485" class="dim-arrow"/>
  <text x="142" y="500" text-anchor="middle" class="dim-label" font-size="10">HSYNC_W</text>

  <!-- HBP width -->
  <line x1="154" y1="475" x2="154" y2="490" class="dim-line"/>
  <line x1="250" y1="475" x2="250" y2="490" class="dim-line"/>
  <line x1="154" y1="485" x2="250" y2="485" class="dim-arrow"/>
  <text x="202" y="500" text-anchor="middle" class="dim-label" font-size="10">HBP</text>

  <!-- Active width -->
  <line x1="250" y1="475" x2="250" y2="490" class="dim-line"/>
  <line x1="922" y1="475" x2="922" y2="490" class="dim-line"/>
  <line x1="250" y1="485" x2="922" y2="485" class="dim-arrow"/>
  <text x="586" y="500" text-anchor="middle" class="dim-label" font-size="10">HACT = 800 PCLK</text>

  <!-- HFP width -->
  <line x1="922" y1="475" x2="922" y2="490" class="dim-line"/>
  <line x1="1018" y1="475" x2="1018" y2="490" class="dim-line"/>
  <line x1="922" y1="485" x2="1018" y2="485" class="dim-arrow"/>
  <text x="970" y="500" text-anchor="middle" class="dim-label" font-size="10">HFP</text>

  <!-- Legend -->
  <rect x="130" y="510" width="10" height="3" fill="#2b8a3e10" stroke="#2b8a3e" stroke-width="0.5"/>
  <text x="145" y="515" font-size="9" fill="#6c757d">HSYNC 区间</text>
  <rect x="230" y="510" width="10" height="3" fill="#e8590c10" stroke="#e8590c" stroke-width="0.5"/>
  <text x="245" y="515" font-size="9" fill="#6c757d">HBP 区间</text>
  <rect x="330" y="510" width="10" height="3" fill="#1864ab08" stroke="#1864ab" stroke-width="0.5"/>
  <text x="345" y="515" font-size="9" fill="#6c757d">有效显示区间</text>
  <rect x="440" y="510" width="10" height="3" fill="#868e9608" stroke="#868e96" stroke-width="0.5"/>
  <text x="455" y="515" font-size="9" fill="#6c757d">HFP 区间</text>
</svg>